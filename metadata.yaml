name: astrbot_plugin_cs_match
desc: CS2 比赛推送插件，支持关注战队、赛前提醒、赛后数据推送
version: 4.1.0
author: Aut-sep
repo: "https://github.com/Aut-sep/Astrbot-plugin-CS2-match-push"
main_module_path: main.py

config_schema:
  pandascore_token:
    type: string
    hint: "PandaScore API Token（必填）"
    default: ""
  web_panel_port:
    type: int
    hint: "Web 管理面板端口（默认 8765）"
    default: 8765
  web_panel_host:
    type: string
    hint: "Web 管理面板监听地址（默认 127.0.0.1，仅本机可访问）"
    default: "127.0.0.1"
  web_panel_enabled:
    type: bool
    hint: "是否启用 Web 管理面板"
    default: true
  fetch_interval_min:
    type: int
    hint: "日程自动刷新间隔（分钟）"
    default: 10
  fetch_ahead_days:
    type: int
    hint: "提前获取多少天内的赛程"
    default: 2
  image_push_enabled:
    type: bool
    hint: "是否启用图片版推送（赛前提醒 / 赛后结果）"
    default: true
